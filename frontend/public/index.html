<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assassin's Creed Characters</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #e74c3c;
            --text-color: #333;
            --light-bg: #f5f6fa;
            --card-bg: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            background-color: var(--light-bg);
            padding: 2rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1rem;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            padding: 1.5rem 0;
            border-bottom: 2px solid var(--accent-color);
        }

        h1 {
            color: var(--primary-color);
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: #7f8c8d;
            font-weight: 300;
        }

        .characters-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .character-card {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .character-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
        }

        .character-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--accent-color);
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }

        .character-card:hover::before {
            transform: scaleX(1);
        }

        .character-name {
            color: var(--primary-color);
            margin-bottom: 0.5rem;
            font-size: 1.2rem;
            font-weight: 600;
        }

        .loading {
            text-align: center;
            font-size: 1.2rem;
            color: #7f8c8d;
            margin: 2rem 0;
        }

        .error {
            text-align: center;
            color: #e74c3c;
            margin: 2rem 0;
            padding: 1rem;
            background-color: #fde8e8;
            border-radius: 4px;
        }

        @media (max-width: 768px) {
            .characters-container {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 1rem;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            .characters-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Assassin's Creed</h1>
            <p class="subtitle">Meet the legendary assassins</p>
        </header>

        <div id="characters" class="characters-container">
            <div class="loading" id="loading">Loading assassins...</div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const charactersContainer = document.getElementById('characters');
            const loadingElement = document.getElementById('loading');
            
            async function fetchCharacters() {
                try {
                    const response = await fetch('/api/characters');
                    if (!response.ok) {
                        throw new Error('Failed to fetch characters');
                    }
                    const characters = await response.json();
                    displayCharacters(characters);
                } catch (error) {
                    console.error('Error:', error);
                    showError('Failed to load characters. Please try again later.');
                } finally {
                    loadingElement.style.display = 'none';
                }
            }

            function displayCharacters(characters) {
                charactersContainer.innerHTML = ''; // Clear loading message
                
                if (characters.length === 0) {
                    showError('No assassins found.');
                    return;
                }
                
                characters.forEach(character => {
                    const characterElement = document.createElement('div');
                    characterElement.className = 'character-card';
                    characterElement.innerHTML = `
                        <h3 class="character-name">${character}</h3>
                        <p>Master Assassin</p>
                    `;
                    charactersContainer.appendChild(characterElement);
                });
            }

            function showError(message) {
                const errorElement = document.createElement('div');
                errorElement.className = 'error';
                errorElement.textContent = message;
                charactersContainer.innerHTML = '';
                charactersContainer.appendChild(errorElement);
            }

            // Initial fetch
            fetchCharacters();
        });
    </script>
</body>
</html>
